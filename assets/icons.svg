<!-- Reactor Protocol icon sprite.
     NOTE: index.html embeds an inline copy of these <symbol>s because
     Chrome blocks external <use href> targets over the file:// protocol.
     Keep both copies in sync when editing. -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <symbol id="icon-timer" viewBox="0 0 24 24">
    <circle cx="12" cy="13" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M12 9v4l3 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M9 2h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>
  <symbol id="icon-mine" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="5" fill="currentColor"/>
    <path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M18.4 5.6l-2.8 2.8M8.4 15.6l-2.8 2.8"
          stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>
  <symbol id="icon-flag" viewBox="0 0 24 24">
    <path d="M7 21V4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M7 4l10 4-10 4z" fill="currentColor"/>
  </symbol>
  <symbol id="icon-shield" viewBox="0 0 24 24">
    <path d="M12 2l8 3v6c0 5-3.5 8.5-8 11-4.5-2.5-8-6-8-11V5z"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    <path d="M9 11.5l2.2 2.2L15.5 9" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
  <symbol id="icon-scanner" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="2.4" fill="currentColor"/>
    <path d="M12 4a8 8 0 018 8M12 7.2a4.8 4.8 0 014.8 4.8" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M12 20a8 8 0 01-8-8M12 16.8A4.8 4.8 0 017.2 12" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>
  <symbol id="icon-defuser" viewBox="0 0 24 24">
    <path d="M14 3l7 7-8.5 8.5a4.95 4.95 0 11-7-7z" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    <path d="M13 8l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>
  <symbol id="icon-heat" viewBox="0 0 24 24">
    <path d="M12 3c2 3.5 6 5.5 6 10a6 6 0 11-12 0c0-2 1-3.8 2.2-5.4C9.6 5.8 11 4.6 12 3z"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    <path d="M12 11c1 1.4 2.4 2.3 2.4 4.1A2.4 2.4 0 0112 17.5a2.4 2.4 0 01-2.4-2.4c0-1.8 1.4-2.7 2.4-4.1z"
          fill="currentColor"/>
  </symbol>
  <symbol id="icon-restart" viewBox="0 0 24 24">
    <path d="M4 12a8 8 0 108-8" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round"/>
    <path d="M12 4H6m6 0v6" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
  <symbol id="icon-help" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M9.5 9.5a2.5 2.5 0 113.6 2.2c-.8.4-1.1 1-1.1 1.8v.5" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <circle cx="12" cy="17.2" r="1.2" fill="currentColor"/>
  </symbol>
  <symbol id="icon-corrupt" viewBox="0 0 24 24">
    <path d="M3 14l4-6 3 4 4-8 3 6 4-2" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3 20h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 3"/>
  </symbol>
</svg>
